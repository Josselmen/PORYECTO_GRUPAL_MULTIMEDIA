<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyecto Grupal Multimedia</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
    }

    .menu {
      margin-top: 50px;
    }

    button {
      padding: 15px 25px;
      margin: 15px;
      font-size: 18px;
      background: #00bcd4;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #0097a7;
    }

    #visor {
      display: none;
      margin-top: 20px;
    }

    iframe {
      width: 80%;
      height: 500px;
      border-radius: 10px;
    }

    .volver {
      margin-top: 20px;
      background: #ff5252;
    }
  </style>

</head>

<body>

  <h1>Proyecto Grupal Multimedia</h1>

  <div class="menu" id="menu">
    <button onclick="verModelo()">Ver Modelo 3D</button>
    <button onclick="verAnimacion()">Ver Animación Unity</button>
  </div>

  <div id="visor"></div>

  <script>

    function verModelo() {
      document.getElementById("menu").style.display = "none";

      document.getElementById("visor").innerHTML = `
        <iframe 
          src="https://sketchfab.com/models/0475cd512e5e427c87f7a8f2fe731219/embed"
          allow="autoplay; fullscreen; xr-spatial-tracking"
          allowfullscreen>
        </iframe>
        <br>
        <button class="volver" onclick="volver()">Volver</button>
      `;

      document.getElementById("visor").style.display = "block";
    }

    function verAnimacion() {
      document.getElementById("menu").style.display = "none";

      document.getElementById("visor").innerHTML = `
        <iframe 
          src="https://itch.io/embed-upload/REEMPLAZA_ESTO"
          allowfullscreen>
        </iframe>
        <br>
        <button class="volver" onclick="volver()">Volver</button>
      `;

      document.getElementById("visor").style.display = "block";
    }

    function volver() {
      document.getElementById("visor").style.display = "none";
      document.getElementById("menu").style.display = "block";
    }

  </script>

</body>
</html>
